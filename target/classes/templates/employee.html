<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DevFlow | Employee</title>
</head>
<body class="bg-slate-900 text-slate-300 font-mono p-10">
    <div class="max-w-2xl mx-auto bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <div>
                <h1 class="text-cyan-400 text-xl font-bold italic">EMPLOYEE_PORTAL</h1>
                <p class="text-[10px] text-slate-500 uppercase" th:text="${role}">Loading Role...</p>
            </div>
            <a href="/" class="text-[10px] text-slate-500 border border-slate-700 px-2 py-1 rounded">Disconnect</a>
        </div>

        <div class="bg-slate-900/50 p-6 rounded border border-slate-700 mb-8 flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-500 uppercase">Monthly_Salary</p>
                <p class="text-2xl text-white font-bold" th:text="${amount}">$0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase">Payout_Status</p>
                <p class="font-bold text-xs uppercase" th:classappend="${salary == 'Paid' ? 'text-green-400' : 'text-red-400'}" th:text="${salary}">Pending</p>
            </div>
        </div>

        <div class="bg-slate-700/20 p-6 rounded-lg border border-cyan-900/50">
            <h3 class="text-xs font-bold text-cyan-500 uppercase mb-4 tracking-widest">Leave Request Terminal</h3>
            <form th:action="@{/apply-leave}" method="POST" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" name="startDate" required class="bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white">
                    <input type="date" name="endDate" required class="bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white">
                </div>
                <textarea name="reason" placeholder="ENTER REASON FOR LEAVE..." required class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white h-20 outline-none focus:border-cyan-500"></textarea>
                <button type="submit" class="w-full border border-cyan-500 text-cyan-400 font-bold py-3 rounded hover:bg-cyan-500 hover:text-white transition uppercase text-xs">Transmit Request</button>
            </form>
            <div class="mt-6 p-4 bg-slate-900 rounded border border-slate-700 text-[10px] space-y-1">
                <p>LAST_DATES: <span class="text-white" th:text="${dates}">N/A</span></p>
                <p>STATUS: <span class="font-bold uppercase" th:classappend="${leave == 'Approved' ? 'text-green-400' : (leave == 'Rejected' ? 'text-red-500' : 'text-yellow-500')}" th:text="${leave}">No Request</span></p>
            </div>
        </div>
    </div>
</body>
</html>
