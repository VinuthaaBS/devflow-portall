<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DevFlow | Admin Dashboard</title>
</head>
<body class="bg-slate-900 text-slate-300 font-mono p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-cyan-900 pb-4">
            <h1 class="text-cyan-400 text-2xl font-bold tracking-tighter italic">ADMIN_TERMINAL_v1.1</h1>
            <a href="/" class="text-[10px] bg-red-900/20 text-red-500 border border-red-900/50 px-4 py-1 rounded hover:bg-red-900 hover:text-white transition uppercase font-bold">Log Out</a>
        </header>

        <div class="bg-slate-800 rounded-lg border border-slate-700 shadow-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900/50 text-slate-500 text-[10px] uppercase tracking-wider">
                    <tr>
                        <th class="p-4 border-b border-slate-700">Employee</th>
                        <th class="p-4 border-b border-slate-700">Leave Period</th>
                        <th class="p-4 border-b border-slate-700">Leave Status</th>
                        <th class="p-4 border-b border-slate-700">Salary Amount</th>
                        <th class="p-4 border-b border-slate-700 text-center">Operations</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-slate-700 hover:bg-slate-700/20 transition">
                        <td class="p-4 font-bold text-white">John Doe</td>
                        <td class="p-4 text-xs text-slate-400" th:text="${dates}">No Request</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-[10px] font-bold border border-yellow-900 bg-yellow-900/20 text-yellow-500" th:text="${leave}">Pending</span>
                        </td>
                        <td class="p-4">
                            <div class="flex flex-col">
                                <span class="text-white font-bold" th:text="${amount}">$0</span>
                                <span class="text-[9px] uppercase font-bold" th:classappend="${salary == 'Paid' ? 'text-blue-400' : 'text-red-400'}" th:text="${salary}">Pending</span>
                            </div>
                        </td>
                        <td class="p-4 flex gap-2 justify-center">
                            <form th:action="@{/approve-leave}" method="POST">
                                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[9px] px-3 py-1.5 rounded uppercase font-black transition">Approve</button>
                            </form>
                            <form th:action="@{/pay-salary}" method="POST">
                                <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white text-[9px] px-3 py-1.5 rounded uppercase font-black transition">Pay Salary</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
