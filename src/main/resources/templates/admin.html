<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DevFlow | Admin</title>
</head>
<body class="bg-slate-900 text-slate-300 font-mono p-10">
    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-800 p-4 rounded border border-slate-700">
                <p class="text-[9px] text-slate-500 uppercase">Server_Uptime</p>
                <p class="text-green-500 font-bold" th:text="${uptime}">99.9%</p>
            </div>
            <div class="bg-slate-800 p-4 rounded border border-slate-700">
                <p class="text-[9px] text-slate-500 uppercase">Database_Link</p>
                <p class="text-cyan-500 font-bold uppercase italic">Active</p>
            </div>
            <div class="bg-slate-800 p-4 rounded border border-slate-700">
                <p class="text-[9px] text-slate-500 uppercase">Last_Deployment</p>
                <p class="text-white font-bold text-[10px]" th:text="${lastBuild}">N/A</p>
            </div>
        </div>

        <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900/50 text-slate-500 text-[10px] uppercase">
                    <tr>
                        <th class="p-4">Employee</th>
                        <th class="p-4">Leave Info</th>
                        <th class="p-4">Salary</th>
                        <th class="p-4 text-center">Operations</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-slate-700 hover:bg-slate-700/20">
                        <td class="p-4">
                            <p class="text-white font-bold">John Doe</p>
                            <p class="text-[9px] text-slate-500 uppercase" th:text="${role}">Role</p>
                        </td>
                        <td class="p-4">
                            <p class="text-[10px] text-white" th:text="${dates}">No Request</p>
                            <p class="text-[10px] text-slate-500 italic mb-1" th:text="${reason}">N/A</p>
                            <span class="text-[9px] font-bold uppercase px-1 rounded bg-slate-900 border border-slate-700" th:text="${leave}">Status</span>
                        </td>
                        <td class="p-4">
                            <p class="text-white font-bold" th:text="${amount}">$0</p>
                            <p class="text-[10px] uppercase" th:classappend="${salary == 'Paid' ? 'text-green-400' : 'text-red-400'}" th:text="${salary}">Pending</p>
                        </td>
                        <td class="p-4 flex gap-2 justify-center mt-2">
                            <form th:action="@{/approve-leave}" method="POST"><button class="bg-emerald-600 text-white text-[9px] px-2 py-1 rounded font-bold">APPROVE</button></form>
                            <form th:action="@{/reject-leave}" method="POST"><button class="bg-red-700 text-white text-[9px] px-2 py-1 rounded font-bold">REJECT</button></form>
                            <form th:action="@{/pay-salary}" method="POST"><button class="bg-cyan-600 text-white text-[9px] px-2 py-1 rounded font-bold">PAY</button></form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
