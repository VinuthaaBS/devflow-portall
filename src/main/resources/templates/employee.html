<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DevFlow | My Portal</title>
</head>
<body class="bg-slate-900 text-slate-300 font-mono p-4">
    <div class="max-w-xl mx-auto mt-10">
        <div class="bg-slate-800 rounded-t-xl p-8 border-x border-t border-slate-700 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 bg-cyan-500 text-slate-900 text-[10px] font-black rotate-45 translate-x-8 -translate-y-2 w-32 text-center uppercase">Active</div>
            <div class="flex items-center gap-6">
                <div class="h-20 w-20 rounded-full bg-cyan-900 border-2 border-cyan-500 flex items-center justify-center text-3xl font-bold text-cyan-400" th:text="${emp.initials}">JD</div>
                <div>
                    <h2 class="text-2xl font-bold text-white uppercase tracking-tighter" th:text="${emp.name}">Employee Name</h2>
                    <p class="text-cyan-500 text-xs font-bold" th:text="${emp.role}">DevOps Specialist</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 border-x border-slate-700 p-8 grid grid-cols-2 gap-4">
            <div class="bg-slate-900/50 p-4 rounded border border-slate-700">
                <p class="text-[9px] text-slate-500 uppercase">Current Salary</p>
                <p class="text-xl font-bold text-white" th:text="${emp.salary}">$0</p>
                <span class="text-[10px] uppercase font-black" th:classappend="${emp.salaryStatus == 'Paid' ? 'text-green-500' : 'text-red-500'}" th:text="${emp.salaryStatus}">Pending</span>
            </div>
            <div class="bg-slate-900/50 p-4 rounded border border-slate-700">
                <p class="text-[9px] text-slate-500 uppercase">Leave Balance</p>
                <p class="text-xl font-bold text-white">24 Days</p>
                <span class="text-[10px] text-cyan-500 uppercase font-black">Annual_Quota</span>
            </div>
        </div>

        <div class="bg-slate-800 rounded-b-xl border border-slate-700 p-8 pt-0">
            <form th:action="@{/apply-leave}" method="POST" class="space-y-4 pt-6 border-t border-slate-700/50">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" name="startDate" required class="bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white outline-none focus:border-cyan-500">
                    <input type="date" name="endDate" required class="bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white outline-none focus:border-cyan-500">
                </div>
                <textarea name="reason" placeholder="REASON FOR LEAVE..." required class="w-full bg-slate-900 border border-slate-700 p-3 rounded text-xs text-white outline-none focus:border-cyan-500 h-24"></textarea>
                <button class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded transition uppercase text-xs tracking-widest shadow-lg shadow-cyan-900/40">Transmit_Request</button>
            </form>
            <div class="mt-4 p-3 bg-slate-900 rounded border border-slate-700 text-[10px] flex justify-between uppercase">
                <span>Status: <b class="ml-2" th:classappend="${emp.leaveStatus == 'Approved' ? 'text-green-500' : (emp.leaveStatus == 'Rejected' ? 'text-red-500' : 'text-yellow-500')}" th:text="${emp.leaveStatus}">None</b></span>
                <span th:text="${emp.leaveDates}">N/A</span>
            </div>
        </div>
    </div>
</body>
</html>
