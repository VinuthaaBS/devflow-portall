<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DevFlow | Employee Portal</title>
</head>
<body class="bg-slate-900 text-slate-300 font-mono p-10">
    <div class="max-w-2xl mx-auto bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <h1 class="text-cyan-400 text-xl font-bold tracking-tighter italic">EMPLOYEE_PORTAL // ID_99</h1>
            <a href="/" class="text-[10px] text-slate-500 hover:text-white border border-slate-700 px-2 py-1 rounded transition uppercase">Disconnect</a>
        </div>

        <div class="bg-slate-900/50 p-6 rounded border border-slate-700 mb-8 flex justify-between items-center">
            <div>
                <p class="text-[10px] uppercase text-slate-500 mb-1">Current_Salary_Balance</p>
                <p class="text-2xl text-white font-bold" th:text="${amount}">$0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase text-slate-500 mb-1">Status</p>
                <p class="text-green-400 font-bold uppercase text-xs" th:text="${salary}">Pending</p>
            </div>
        </div>

        <div class="bg-slate-700/20 p-6 rounded-lg border border-cyan-900/50">
            <h3 class="text-xs font-bold text-cyan-500 uppercase tracking-widest mb-4">Leave Scheduler</h3>
            
            <form th:action="@{/apply-leave}" method="POST" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase">Start Date</label>
                        <input type="date" name="startDate" required class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase">End Date</label>
                        <input type="date" name="endDate" required class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-xs text-white outline-none focus:border-cyan-500">
                    </div>
                </div>
                <button type="submit" class="w-full border border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-white font-bold py-3 rounded transition uppercase text-xs tracking-widest shadow-lg shadow-cyan-900/20">
                    Submit Leave Request
                </button>
            </form>

            <div class="mt-6 p-4 bg-slate-900 rounded border border-slate-700 space-y-2">
                <p class="text-[10px] text-slate-500 uppercase">Active_Request_Dates: <span class="text-white ml-2" th:text="${dates}">N/A</span></p>
                <p class="text-[10px] text-slate-500 uppercase">Approval_Status: <span class="text-cyan-400 font-bold ml-2" th:text="${leave}">No Request</span></p>
            </div>
        </div>
    </div>
</body>
</html>
